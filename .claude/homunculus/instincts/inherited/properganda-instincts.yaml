# Properganda Workflow Add Or Update Component Animation

## Action

Follow the add-or-update-component-animation workflow:
1. Edit one or more component files in app/components/ (e.g., AboutUs.tsx, Hero.tsx, Commandments.tsx, etc.) to add or update animation logic.
2. Optionally update or add animation utility files in lib/ (e.g., lib/gsap-reveal.ts) or components/ui/ (e.g., blur-text-reveal.tsx, text-reveal-animation.tsx).
3. Optionally update global styles in app/globals.css to support animation effects.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~6x per month
- Files: app/components/*.tsx, lib/gsap-reveal.ts, components/ui/*.tsx

